<!DOCTYPE html>
<html>
<head>
    <title>Hospital Appointment</title>
</head>
<body>

<h2>Hospital Appointment Form</h2>

<form>
    Name:<br>
    <input type="text"><br><br>

    Age:<br>
    <input type="number"><br><br>

    Phone:<br>
    <input type="text"><br><br>

    Doctor:<br>
    <select>
        <option>General</option>
        <option>Heart</option>
        <option>Skin</option>
    </select><br><br>

    Date:<br>
    <input type="date"><br><br>

    <input type="submit" value="Book">
</form>

</body>
</html>
